  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

round: var(--paper);\n    color: var(--ink);\n    box-sizing: border-box;\n    padding: var(--pad-top) var(--pad-x) var(--pad-bottom);\n    overflow: hidden;\n    display: flex;\n    flex-direction: column;\n  }\n  section.slide.dark { background: var(--navy); color: var(--paper); }\n  section.slide.surface { background: var(--paper-2); }\n\n  /* Chrome row at top of every content slide */\n  .chrome {\n    display: flex; justify-content: space-between; align-items: center;\n    font-size: var(--type-small);\n    letter-spacing: 0.08em;\n    text-transform: uppercase;\n    color: var(--ink-3);\n    margin-bottom: var(--gap-title);\n  }\n  .dark .chrome { color: rgba(244,241,234,0.55); }\n  .chrome .left { display: flex; gap: 28px; align-items: center; }\n  .chrome .brand { font-weight: 600; letter-spacing: 0.22em; color: var(--ink); }\n  .dark .chrome .brand { color: var(--paper); }\n  .chrome .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--sky); display: inline-block; }\n\n  h1.title { font-size: var(--type-title); line-height: 1.05; font-weight: 600; letter-spacing: -0.015em; margin: 0; }\n  h1.title .accent { color: var(--sky); }\n  h2.eyebrow { font-size: var(--type-eyebrow); letter-spacing: 0.22em; text-transform: uppercase; font-weight: 600; color: var(--sky); margin: 0 0 16px 0; }\n  p.kicker { font-size: var(--type-body); color: var(--ink-2); line-height: 1.35; max-width: 1500px; margin: 28px 0 0 0; }\n  .dark p.kicker { color: rgba(244,241,234,0.75); }\n\n  .rule { height: 1px; background: var(--rule); width: 100%; }\n  .dark .rule { background: rgba(244,241,234,0.18); }\n\n  /* Section cover */\n  .cover {\n    flex: 1; display: grid; grid-template-columns: 220px 1fr; gap: 60px; align-items: end;\n  }\n  .cover .num {\n    font-family: \"JetBrains Mono\", monospace;\n    font-size: 220px; line-height: 0.85;\n    color: var(--sky);\n    font-weight: 500;\n  }\n  .cover .heading h1 { font-size: 128px; line-height: 1; margin: 0; font-weight: 600; letter-spacing: -0.02em; }\n  .cover .heading .sub { font-size: var(--type-subtitle); color: var(--ink-2); margin-top: 28px; max-width: 1300px; line-height: 1.3; }\n  .dark .cover .heading .sub { color: rgba(244,241,234,0.7); }\n\n  /* Two-column / multi-column */\n  .cols-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 64px; flex: 1; }\n  .cols-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 36px; flex: 1; }\n  .cols-1-1-2 { display: grid; grid-template-columns: 1fr 1fr 2fr; gap: 48px; flex: 1; }\n\n  /* Tables/cards */\n  .card {\n    background: #FFFDF8;\n    border: 1px solid var(--rule);\n    padding: 22px 28px 20px;\n    display: flex; flex-direction: column; gap: 10px;\n  }\n  .dark .card { background: var(--navy-2); border-color: rgba(244,241,234,0.14); }\n  .card .name {\n    font-family: \"JetBrains Mono\", monospace;\n    font-size: var(--type-mono);\n    font-weight: 600;\n    color: var(--sky);\n    letter-spacing: -0.01em;\n  }\n  .card .meta { font-size: var(--type-small); color: var(--ink-3); }\n  .card ul { margin: 6px 0 0 0; padding: 0; list-style: none; }\n  .card li { font-size: 24px; line-height: 1.38; color: var(--ink-2); padding: 1px 0; }\n  .card li .k { font-family: \"JetBrains Mono\", monospace; color: var(--ink); font-size: 24px; }\n  .card li .pk { color: var(--sky); font-weight: 600; }\n  .card li .fk { color: var(--amber); font-weight: 600; }\n\n  /* Code blocks */\n  pre.sql {\n    font-family: \"JetBrains Mono\", monospace;\n    font-size: 22px;\n    line-height: 1.5;\n    background: #FFFDF8;\n    border: 1px solid var(--rule);\n    border-left: 3px solid var(--sky);\n    padding: 22px 26px;\n    margin: 0;\n    color: var(--ink);\n    white-space: pre;\n    overflow: hidden;\n  }\n  .dark pre.sql { background: #0A1322; border-color: rgba(244,241,234,0.16); color: var(--paper); }\n  pre.sql .kw { color: var(--sky); font-weight: 600; }\n  pre.sql .fn { color: var(--amber); }\n  pre.sql .str { color: var(--green); }\n  pre.sql .cmt { color: var(--ink-3); font-style: italic; }\n\n  /* Pill / badges */\n  .pill {\n    display: inline-block;\n    font-family: \"JetBrains Mono\", monospace;\n    font-size: 24px;\n    padding: 6px 14px;\n    border: 1px solid var(--rule-2);\n    border-radius: 999px;\n    color: var(--ink-2);\n    background: #FFFDF8;\n  }\n  .pill.sky { background: var(--sky-soft); border-color: var(--sky); color: var(--navy-2); }\n  .pill.amber { background: oklch(0.95 0.05 70); border-color: var(--amber); color: #6b3a00; }\n  .pill.green { background: oklch(0.95 0.04 150); border-color: var(--green); color: #1a4f30; }\n  .pill.rose  { background: oklch(0.95 0.04 25);  border-color: var(--rose);  color: #6a1818; }\n\n  /* Step number */\n  .step-num {\n    font-family: \"JetBrains Mono\", monospace;\n    font-size: var(--type-mono);\n    color: var(--sky);\n    letter-spacing: 0.04em;\n  }\n\n  /* Bullet list */\n  ul.bullets { list-style: none; padding: 0; margin: 0; }\n  ul.bullets li { position: relative; font-size: var(--type-body); line-height: 1.42; padding: 14px 0 14px 38px; color: var(--ink); border-bottom: 1px solid var(--rule); }\n  ul.bullets li:last-child { border-bottom: none; }\n  ul.bullets li::before {\n    content: \"\"; position: absolute; left: 0; top: 28px;\n    width: 14px; height: 1px; background: var(--sky);\n  }\n  .dark ul.bullets li { color: var(--paper); border-bottom-color: rgba(244,241,234,0.12); }\n\n  ul.bullets-sm li { font-size: var(--type-small); padding: 10px 0 10px 30px; }\n  ul.bullets-sm li::before { top: 22px; width: 12px; }\n\n  /* ER mini-diagram */\n  .er {\n    flex: 1;\n    display: grid;\n    grid-template-columns: repeat(12, 1fr);\n    grid-template-rows: repeat(6, 1fr);\n    gap: 14px;\n    font-family: \"JetBrains Mono\", monospace;\n    font-size: var(--type-mono-sm);\n  }\n  .er .box {\n    background: #FFFDF8;\n    border: 1px solid var(--rule-2);\n    padding: 14px 18px;\n    display: flex; flex-direction: column; justify-content: center;\n    color: var(--ink);\n  }\n  .er .box.primary { background: var(--sky); color: var(--paper); border-color: var(--sky); }\n  .er .box .lbl { font-size: 18px; opacity: 0.7; letter-spacing: 0.08em; text-transform: uppercase; }\n  .er .box .nm { font-size: 26px; font-weight: 600; margin-top: 4px; }\n  .er .rel {\n    font-size: 18px; color: var(--ink-3);\n    display: flex; align-items: center; justify-content: center;\n    letter-spacing: 0.1em;\n  }\n\n  /* Flow diagram (vertical text) */\n  .flow {\n    font-family: \"JetBrains Mono\", monospace;\n    font-size: var(--type-mono-sm);\n    line-height: 1.5;\n    color: var(--ink);\n    white-space: pre;\n  }\n  .dark .flow { color: var(--paper); }\n\n  /* Stats line */\n  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 36px; }\n  .stat .num { font-size: 96px; line-height: 1; font-weight: 600; color: var(--sky); letter-spacing: -0.02em; }\n  .stat .lbl { font-size: var(--type-small); color: var(--ink-2); margin-top: 14px; text-transform: uppercase; letter-spacing: 0.12em; }\n  .dark .stat .lbl { color: rgba(244,241,234,0.65); }\n\n  /* Title slide */\n  section.slide.title-slide {\n    background: var(--navy);\n    color: var(--paper);\n    padding: var(--pad-top) var(--pad-x) var(--pad-bottom);\n    display: flex; flex-direction: column; justify-content: space-between;\n    position: relative;\n    overflow: hidden;\n  }\n  .title-slide .runway {\n    position: absolute; left: 0; right: 0; bottom: 320px;\n    height: 1px; background: linear-gradient(90deg, transparent, rgba(244,241,234,0.4) 20%, rgba(244,241,234,0.4) 80%, transparent);\n  }\n  .title-slide .runway-marks {\n    position: absolute; left: 0; right: 0; bottom: 312px;\n    display: flex; justify-content: space-between; padding: 0 var(--pad-x);\n    font-family: \"JetBrains Mono\", monospace; font-size: 18px; letter-spacing: 0.15em;\n    color: rgba(244,241,234,0.4);\n  }\n\n  /* Diagram steps row */\n  .flow-row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 20px; }\n  .flow-row .step {\n    background: #FFFDF8;\n    border: 1px solid var(--rule);\n    padding: 20px 22px;\n    display: flex; flex-direction: column; gap: 10px;\n    position: relative;\n  }\n  .flow-row .step .n { font-family: \"JetBrains Mono\", monospace; font-size: 20px; color: var(--sky); letter-spacing: 0.1em; }\n  .flow-row .step .t { font-size: 26px; font-weight: 600; line-height: 1.2; }\n  .flow-row .step .d { font-size: 18px; color: var(--ink-2); line-height: 1.35; font-family: \"JetBrains Mono\", monospace; }\n  .flow-row .step:not(:last-child)::after {\n    content: \"→\"; position: absolute; right: -18px; top: 50%; transform: translateY(-50%);\n    color: var(--sky); font-size: 22px; z-index: 2; background: var(--paper); padding: 0 4px;\n  }\n\n  /* Footer page number */\n  .pagenum {\n    position: absolute; right: var(--pad-x); bottom: 36px;\n    font-family: \"JetBrains Mono\", monospace; font-size: 24px;\n    color: var(--ink-3); letter-spacing: 0.14em;\n  }\n  .dark .pagenum { color: rgba(244,241,234,0.45); }\n\n  /* Two col table-row layout */\n  .role-grid { display: grid; grid-template-columns: 220px 1fr; row-gap: 0; column-gap: 36px; }\n  .role-grid .role { font-family: \"JetBrains Mono\", monospace; font-size: var(--type-mono-sm); color: var(--sky); padding: 22px 0; border-top: 1px solid var(--rule); font-weight: 600; letter-spacing: 0.04em; }\n  .role-grid .ops  { font-size: var(--type-small); color: var(--ink); padding: 22px 0; border-top: 1px solid var(--rule); line-height: 1.5; }\n  .role-grid .role:first-child, .role-grid .ops:nth-child(2) { border-top: none; padding-top: 0; }\n  .role-grid .ops .op { font-family: \"JetBrains Mono\", monospace; color: var(--ink-2); margin-right: 6px; }\n\n  /* Side label */\n  .side-label {\n    writing-mode: vertical-rl; transform: rotate(180deg);\n    font-family: \"JetBrains Mono\", monospace; font-size: 18px; letter-spacing: 0.3em;\n    color: var(--ink-3); text-transform: uppercase;\n  }\n\n  /* Big number callout */\n  .callout-box {\n    background: var(--sky-soft);\n    border: 1px solid var(--sky);\n    padding: 24px 28px;\n    font-size: var(--type-small);\n    line-height: 1.5;\n    color: var(--navy-2);\n  }\n  .callout-box .lbl { font-family: \"JetBrains Mono\", monospace; font-size: 18px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--sky); margin-bottom: 10px; display: block; }\n\n  /* Stage scaling done by deck-stage */\n<\u002Fstyle>\n\n\n\n<\u002Fhead>\n<body>\n\n\n\n<deck-stage width=\"1920\" height=\"1080\">\n\n  <!-- =================== 01 — Cover =================== -->\n  <section class=\"slide title-slide\" data-label=\"01 Copertina\">\n    <div style=\"display:flex; justify-content:space-between; align-items:flex-start;\">\n      <div style=\"font-family:'JetBrains Mono',monospace; font-size:26px; letter-spacing:0.22em; color:rgba(244,241,234,0.65);\">SKYPORT / PRESENTAZIONE TECNICA<\u002Fdiv>\n      <div style=\"font-family:'JetBrains Mono',monospace; font-size:26px; letter-spacing:0.18em; color:rgba(244,241,234,0.65);\">A.A. 2025/2026<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"position:relative; z-index:1;\">\n      <div style=\"font-family:'JetBrains Mono',monospace; font-size:26px; letter-spacing:0.3em; color:var(--sky); margin-bottom: 28px;\">SISTEMA INFORMATIVO AEROPORTUALE<\u002Fdiv>\n      <h1 style=\"font-size: 240px; font-weight: 600; letter-spacing: -0.03em; line-height: 0.92; margin: 0;\">SkyPort<span style=\"color:var(--sky);\">.<\u002Fspan><\u002Fh1>\n      <div style=\"font-size: 44px; color: rgba(244,241,234,0.75); margin-top: 32px; max-width: 1400px; line-height: 1.25;\">\n        Database, CRUD e user flow di un sistema di prenotazione voli\n      <\u002Fdiv>\n      <div style=\"display:flex; gap: 56px; margin-top: 72px; font-family:'JetBrains Mono',monospace; font-size: 26px; letter-spacing: 0.18em; color: rgba(244, me\">\n      <div class=\"left\"><span class=\"brand\">SKYPORT<\u002Fspan><span class=\"dot\"><\u002Fspan><span>Database<\u002Fspan><\u002Fdiv>\n      <div>01 / Garanzie<\u002Fdiv>\n    <\u002Fdiv>\n\n    <h1 class=\"title\">Integrità referenziale e concorrenza<\u002Fh1>\n\n    <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 64px; margin-top: 56px; flex: 1;\">\n      <div>\n        <h2 class=\"eyebrow\">Integrità<\u002Fh2>\n        <pre class=\"sql\" style=\"margin-top: 20px;\"><span class=\"cmt\">-- abilitato all'apertura di ogni connessione<\u002Fspan>\n<span class=\"kw\">PRAGMA<\u002Fspan> foreign_keys = <span class=\"kw\">ON<\u002Fspan>;\n\n<span class=\"cmt\">-- esempio dichiarazione FK (estratto da prenotazioni)<\u002Fspan>\n<span class=\"kw\">CREATE TABLE<\u002Fspan> prenotazioni (\n  id                  <span class=\"kw\">INTEGER PRIMARY KEY AUTOINCREMENT<\u002Fspan>,\n  passeggero_id       <span class=\"kw\">INTEGER NOT NULL REFERENCES<\u002Fspan> passeggeri(id)\n                                       <span class=\"kw\">ON DELETE RESTRICT<\u002Fspan>,\n  volo_id             <span class=\"kw\">INTEGER NOT NULL REFERENCES<\u002Fspan> voli(id)\n                                       <span class=\"kw\">ON DELETE RESTRICT<\u002Fspan>,\n  codice_prenotazione <span class=\"kw\">TEXT    NOT NULL UNIQUE<\u002Fspan>,\n  prezzo              <span class=\"kw\">REAL    NOT NULL CHECK<\u002Fspan>(prezzo &gt;= 0),\n  stato               <span class=\"kw\">TEXT    NOT NULL DEFAULT<\u002Fspan> <span class=\"str\">'prenotata'<\u002Fspan>\n                              <span class=\"kw\">CHECK<\u002Fspan>(stato <span class=\"kw\">IN<\u002Fspan> (<span class=\"str\">'prenotata'<\u002Fspan>, <span class=\"str\">'pagata'<\u002Fspan>,\n                                              <span class=\"str\">'cancellata'<\u002Fspan>, <span class=\"str\">'imbarcato'<\u002Fspan>))\n);<\u002Fpre>\n      <\u002Fdiv>\n\n      <div>\n        <h2 class=\"eyebrow\">CONCORRENZA · CONTROLLO OVERBOOKING<\u002Fh2>\n        <pre class=\"sql\" style=\"margin-top: 16px; font-size: 19px;\"><span class=\"kw\">BEGIN<\u002Fspan>;\n\n<span class=\"cmt\">-- 1. conta prenotazioni attive (atomico)<\u002Fspan>\n<span class=\"kw\">SELECT<\u002Fspan> <span class=\"fn\">COUNT<\u002Fspan>(*) <span class=\"kw\">FROM<\u002Fspan> prenotazioni\n <span class=\"kw\">WHERE<\u002Fspan> volo_id = :volo_id\n   <span class=\"kw\">AND<\u002Fspan> stato <span class=\"kw\">IN<\u002Fspan> (<span class=\"str\">'prenotata'<\u002Fspan>,<span class=\"str\">'pagata'<\u002Fspan>);\n\n<span class=\"cmt\">-- 2. se count &lt; posti_totali: INSERT<\u002Fspan>\n<span class=\"kw\">INSERT INTO<\u002Fspan> prenotazioni\n  (passeggero_id, volo_id,\n   codice_prenotazione, prezzo, stato)\n<span class=\"kw\">VALUES<\u002Fspan>\n  (:pid, :vid, :pnr, :prezzo, <span class=\"str\">'prenotata'<\u002Fspan>);\n\n<span class=\"kw\">COMMIT<\u002Fspan>;<\u002Fpre>\n        <p style=\"font-size: 22px; color: rgba(244,241,234,0.7); margin-top: 14px; line-height: 1.4;\">\n          Atomicità garantita da <span style=\"font-family:'JetBrains Mono',monospace; color: var(--sky);\">BEGIN/COMMIT<\u002Fspan> di <span style=\"font-family:'JetBrains Mono',monospace;\">sqlite3<\u002Fspan>: niente colonne contatore, nessuna race condition.\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"pagenum\">09 / 23<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- =================== 10 — Sezione 2 cover =================== -->\n  <section class=\"slide dark\" data-label=\"10 Sezione 2\">\n    <div class=\"chrome\">\n      <div class=\"left\"><span class=\"brand\">SKYPORT<\u002Fspan><span class=\"dot\"><\u002Fspan><span>Sezione<\u002Fspan><\u002Fdiv>\n      <div>02 / 04<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"cover\">\n      <div class=\"num\">02<\u002Fdiv>\n      <div class=\"heading\">\n        <h1>CRUD e<br>interfacciamento.<\u002Fh1>\n        <div class=\"sub\">Quattro ruoli, sei operazioni canoniche, una manciata di query. Vincoli verificati <em>prima<\u002Fem> di scrivere, transazioni quando lo stato cambia.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"pagenum\">10 / 23<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- =================== 11 — Matrice ruoli =================== -->\n  <section class=\"slide\" data-label=\"11 Ruoli CRUD\">\n    <div class=\"chrome\">\n      <div class=\"left\"><span class=\"brand\">SKYPORT<\u002Fspan><span class=\"dot\"><\u002Fspan><span>CRUD<\u002Fspan><\u002Fdiv>\n      <div>02 / Ruoli<\u002Fdiv>\n    <\u002Fdiv>\n\n    <h1 class=\"title\">Cosa può fare ciascun ruolo<\u002Fh1>\n\n    <div class=\"role-grid\" style=\"margin-top: 56px;\">\n      <div class=\"role\">passeggero<\u002Fdiv>\n      <div class=\"ops\">\n        <span class=\"op\">[R]<\u002Fspan> ricerca voli, lista prenotazioni proprie &nbsp;·&nbsp;\n        <span class=\"op\">[C]<\u002Fspan> nuova prenotazione &nbsp;·&nbsp;\n        <span class=\"op\">[U]<\u002Fspan> pagamento, check‑in online &nbsp;·&nbsp;\n        <span class=\"op\">[D]<\u002Fspan> cancellazione prenotazione <em>(solo se non ancora pagata)<\u002Fem>\n      <\u002Fdiv>\n\n      <div class=\"role\">compagnia<\u002Fdiv>\n      <div class=\"ops\">\n        <span class=\"op\">[C]<\u002Fspan> nuovo volo &nbsp;·&nbsp;\n        <span class=\"op\">[R]<\u002Fspan> elenco voli e prenotazioni del proprio vettore &nbsp;·&nbsp;\n        <span class=\"op\">[U]<\u002Fspan> orari, gate, stato volo &nbsp;·&nbsp;\n        <span class=\"op\">[D]<\u002Fspan> cancellazione volo <em>(vietata se ci sono prenotazioni attive — qualsiasi stato non cancellato)<\u002Fem>\n      <\u002Fdiv>\n\n      <div class=\"role\">operatore<\u002Fdiv>\n      <div class=\"ops\">\n        <span class=\"op\">[R]<\u002Fspan> ricerca prenotazione per PNR/documento &nbsp;·&nbsp;\n        <span class=\"op\">[C]<\u002Fspan> check‑in al banco · emissione carta d'imbarco &nbsp;·&nbsp;\n        <span class=\"op\">[U]<\u002Fspan> riassegnazione gate, modifica posto\n      <\u002Fdiv>\n\n      <div class=\"role\">admin<\u002Fdiv>\n      <div class=\"ops\">\n        <span class=\"op\">[R]<\u002Fspan> dashboard: voli per compagnia, occupazione gate, storico stati &nbsp;·&nbsp;\n        <span class=\"op\">[CUD]<\u002Fspan> gestione anagrafiche, utenti, override stato volo\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"pagenum\">11 / 23<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- =================== 12 — Ricerca voli =================== -->\n  <section class=\"slide\" data-label=\"12 Ricerca voli\">\n    <div class=\"chrome\">\n      <div class=\"left\"><span class=\"brand\">SKYPORT<\u002Fspan><span class=\"dot\"><\u002Fspan><span>CRUD<\u002Fspan><\u002Fdiv>\n      <div>02 / Read · Ricerca voli<\u002Fdiv>\n    <\u002Fdiv>\n\n    <h1 class=\"title\">Ricerca voli &nbsp;<span style=\"color:var(--ink-3); font-weight:400;\">— SELECT con filtri<\u002Fspan><\u002Fh1>\n\n    <div style=\"display:grid; grid-template-columns: 1.4fr 1fr; gap: 56px; margin-top: 48px; flex:1;\">\n      <pre class=\"sql\" style=\"font-size: 19px;\"><span class=\"cmt\">-- :cerca_voli  ·  SELECT dinamica via Jinja2<\u002Fspan>\n<span class=\"kw\">SELECT<\u002Fspan> v.id, v.codice_volo,\n       c.nome   <span class=\"kw\">AS<\u002Fspan> compagnia, g.codice <span class=\"kw\">AS<\u002Fspan> gate,\n       v.origine, v.destinazione,\n       v.data_ora_partenza, v.data_ora_arrivo,\n       v.posti_totali, v.stato, v.prezzo_base,\n       v.posti_totali - <span class=\"fn\">COALESCE<\u002Fspan>((\n           <span class=\"kw\">SELECT<\u002Fspan> <span class=\"fn\">COUNT<\u002Fspan>(*) <span class=\"kw\">FROM<\u002Fspan> prenotazioni p\n            <span class=\"kw\">WHERE<\u002Fspan> p.volo_id = v.id\n              <span class=\"kw\">AND<\u002Fspan> p.stato <span class=\"kw\">IN<\u002Fspan> (<span class=\"str\">'prenotata'<\u002Fspan>,<span class=\"str\">'pagata'<\u002Fspan>,<span class=\"str\">'imbarcato'<\u002Fspan>)\n       ), 0) <span class=\"kw\">AS<\u002Fspan> posti_liberi,\n       ao.lat <span class=\"kw\">AS<\u002Fspan> orig_lat, ao.lon <span class=\"kw\">AS<\u002Fspan> orig_lon, ao.nome <span class=\"kw\">AS<\u002Fspan> orig_nome,\n       ad.lat <span class=\"kw\">AS<\u002Fspan> dest_lat, ad.lon <span class=\"kw\">AS<\u002Fspan> dest_lon, ad.nome <span class=\"kw\">AS<\u002Fspan> dest_nome\n  <span class=\"kw\">FROM<\u002Fspan> voli v\n  <span class=\"kw\">JOIN<\u002Fspan> compagnie_aeree c <span class=\"kw\">ON<\u002Fspan> v.compagnia_id = c.id\n  <span class=\"kw\">LEFT JOIN<\u002Fspan> gate g         <span class=\"kw\">ON<\u002Fspan> v.gate_id = g.id\n  <span class=\"kw\">LEFT JOIN<\u002Fspan> aeroporti ao   <span class=\"kw\">ON<\u002Fspan> v.origine      = ao.codice\n  <span class=\"kw\">LEFT JOIN<\u002Fspan> aeroporti ad   <span class=\"kw\">ON<\u002Fspan> v.destinazione = ad.codice\n <span class=\"kw\">WHERE<\u002Fspan> 1=1\n<span class=\"str\">{% if origine %}<\u002Fspan>   <span class=\"kw\">AND<\u002Fspan> v.origine      = :origine<span class=\"str\">{% endif %}<\u002Fspan>\n<span class=\"str\">{% if destinazione %}<\u002Fspan><span class=\"kw\">AND<\u002Fspan> v.destinazione = :destinazione<span class=\"str\">{% endif %}<\u002Fspan>\n<span class=\"str\">{% if data %}<\u002Fspan>      <span class=\"kw\">AND<\u002Fspan> <span class=\"fn\">DATE<\u002Fspan>(v.data_ora_partenza) = :data<span class=\"str\">{% endif %}<\u002Fspan>\n   <span class=\"kw\">AND<\u002Fspan> v.data_ora_partenza &gt; <span class=\"fn\">datetime<\u002Fspan>(<span class=\"str\">'now'<\u002Fspan>,<span class=\"str\">'localtime'<\u002Fspan>)\n <span class=\"kw\">ORDER BY<\u002Fspan> v.data_ora_partenza<\u002Fpre>\n\n      <div>\n        <h2 class=\"eyebrow\">Note<\u002Fh2>\n        <ul class=\"bullets bullets-sm\" style=\"margin-top: 18px;\">\n          <li>Parametri <span style=\"font-family:'JetBrains Mono',monospace;\">:origine :destinazione :data<\u002Fspan> sempre <strong>bind<\u002Fstrong>, mai concatenati (SQL injection)<\u002Fli>\n          <li>Filtri opzionali via blocchi Jinja2 <span style=\"font-family:'JetBrains Mono',monospace;\">{% if %}<\u002Fspan>: la SQL si compone a runtime senza concatenazione di stringhe<\u002Fli>\n          <li>JOIN su <span style=\"font-family:'JetBrains Mono',monospace;\">aeroporti<\u002Fspan> (alias <span style=\"font-family:'JetBrains Mono',monospace;\">ao<\u002Fspan>, <span style=\"font-family:'JetBrains Mono',monospace;\">ad<\u002Fspan>) recupera nome e coordinate WGS-84: servono alla mappa Leaflet della home per disegnare le rotte<\u002Fli>\n          <li><span style=\"font-family:'JetBrains Mono',monospace;\">posti_liberi<\u002Fspan> calcolato con subquery <span style=\"font-family:'JetBrains Mono',monospace;\">COUNT<\u002Fspan> + <span style=\"font-family:'JetBrains Mono',monospace;\">COALESCE<\u002Fspan>: nessun contatore in <span style=\"font-family:'JetBrains Mono',monospace;\">voli<\u002Fspan><\u002Fli>\n          <li>Endpoint Flask: <span style=\"font-family:'JetBrains Mono',monospace; color: var(--sky);\">GET /api/voli/search<\u002Fspan><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"pagenum\">12 / 23<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- =================== 13 — Prenotazione atomica =================== -->\n  <section class=\"slide\" data-label=\"13 Prenotazione\">\n    <div class=\"chrome\">\n      <div class=\"left\"><span class=\"brand\">SKYPORT<\u002Fspan><span class=\"dot\"><\u002Fspan><span>CRUD<\u002Fspan><\u002Fdiv>\n      <div>02 / Create · Prenotazione<\u002Fdiv>\n    <\u002Fdiv>\n\n    <h1 class=\"title\">Prenotazione &nbsp;<span style=\"color:var(--ink-3); font-weight:400;\">— INSERT con disponibilità atomica<\u002Fspan><\u002Fh1>\n\n    <div style=\"display:grid; grid-template-columns: 1.4fr 1fr; gap: 56px; margin-top: 48px; flex:1;\">\n      <pre class=\"sql\" style=\"font-size: 18px;\"><span class=\"cmt\">-- :volo_by_id<\u002Fspan>\n<span class=\"kw\">SELECT<\u002Fspan> * <span class=\"kw\">FROM<\u002Fspan> voli <span class=\"kw\">WHERE<\u002Fspan> id = :id;\n\n<span class=\"cmt\">-- :posti_occupati_count<\u002Fspan>\n<span class=\"kw\">SELECT<\u002Fspan> <span class=\"fn\">COUNT<\u002Fspan>(*) <span class=\"kw\">FROM<\u002Fspan> prenotazioni\n <span class=\"kw\">WHERE<\u002Fspan> volo_id = :volo_id\n   <span class=\"kw\">AND<\u002Fspan> stato <span class=\"kw\">IN<\u002Fspan> (<span class=\"str\">'prenotata'<\u002Fspan>,<span class=\"str\">'pagata'<\u002Fspan>,<span class=\"str\">'imbarcato'<\u002Fspan>);\n\n<span class=\"cmt\">-- :pren_esistente<\u002Fspan>\n<span class=\"kw\">SELECT<\u002Fspan> id <span class=\"kw\">FROM<\u002Fspan> prenotazioni\n <span class=\"kw\">WHERE<\u002Fspan> passeggero_id = :passeggero_id\n   <span class=\"kw\">AND<\u002Fspan> volo_id = :volo_id\n   <span class=\"kw\">AND<\u002Fspan> stato != <span class=\"str\">'cancellata'<\u002Fspan>;\n\n<span class=\"cmt\">-- :pren_pnr_check<\u002Fspan>\n<span class=\"kw\">SELECT<\u002Fspan> id <span class=\"kw\">FROM<\u002Fspan> prenotazioni\n <span class=\"kw\">WHERE<\u002Fspan> codice_prenotazione = :pnr;\n\n<span class=\"cmt\">-- :insert_prenotazione<\u002Fspan>\n<span class=\"kw\">INSERT INTO<\u002Fspan> prenotazioni\n  (passeggero_id, volo_id,\n   codice_prenotazione, prezzo, stato)\n<span class=\"kw\">VALUES<\u002Fspan>\n  (:passeggero_id, :volo_id,\n   :pnr, :prezzo, <span class=\"str\">'prenotata'<\u002Fspan>);<\u002Fpre>\n\n      <div>\n        <h2 class=\"eyebrow\">Vincoli verificati<\u002Fh2>\n        <ul class=\"bullets bullets-sm\" style=\"margin-top: 18px;\">\n          <li><strong>Esistenza volo<\u002Fstrong> — <span style=\"font-family:'JetBrains Mono',monospace;\">volo_by_id<\u002Fspan> recupera il volo target (e il <span style=\"font-family:'JetBrains Mono',monospace;\">prezzo_base<\u002Fspan> per il calcolo).<\u002Fli>\n          <li><strong>Disponibilità posti<\u002Fstrong> — <span style=\"font-family:'JetBrains Mono',monospace;\">posti_occupati_count<\u002Fspan> conta le prenotazioni attive: si procede solo se <em>count &lt; posti_totali<\u002Fem>. Controllo atomico, niente colonne contatore.<\u002Fli>\n          <li><strong>Anti doppia prenotazione<\u002Fstrong> — <span style=\"font-family:'JetBrains Mono',monospace;\">pren_esistente<\u002Fspan> impedisce che lo stesso passeggero prenoti due volte lo stesso volo (escluse le cancellate).<\u002Fli>\n          <li><strong>PNR univoco<\u002Fstrong> — <span style=\"font-family:'JetBrains Mono',monospace;\">pren_pnr_check<\u002Fspan> verifica che il codice generato non collida; vincolo <span style=\"font-family:'JetBrains Mono',monospace;\">UNIQUE<\u002Fspan> a livello DB come difesa finale.<\u002Fli>\n          <li><strong>Insert finale<\u002Fstrong> — <span style=\"font-family:'JetBrains Mono',monospace;\">insert_prenotazione<\u002Fspan> crea la riga con stato <span class=\"pill sky\" style=\"font-size: 18px; padding: 3px 10px;\">prenotata<\u002Fspan>. Tutto dentro una transazione: niente race condition.<\u002Fli>\n          <li>Endpoint: <span style=\"font-family:'JetBrains Mono',monospace; color: var(--sky);\">POST /api/prenota<\u002Fspan><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"pagenum\">13 / 23<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- =================== 14 — Pagamento + Check-in =================== -->\n  <section class=\"slide\" data-label=\"14 Pagamento checkin\">\n    <div class=\"chrome\">\n      <div class=\"left\"><span class=\"brand\">SKYPORT<\u002Fspan><span class=\"dot\"><\u002Fspan><span>CRUD<\u002Fspan><\u002Fdiv>\n      <div>02 / Update · Pagamento e check‑in<\u002Fdiv>\n    <\u002Fdiv>\n\n    <h1 class=\"title\">Pagamento e check‑in<\u002Fh1>\n\n    <div style=\"display:grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-top: 48px; flex: 1;\">\n      <div>\n        <h2 class=\"eyebrow\">Pagamento &nbsp;·&nbsp; UPDATE idempotente<\u002Fh2>\n        <pre class=\"sql\" style=\"margin-top: 18px;\"><span class=\"cmt\">-- :update_pren_pagata<\u002Fspan>\n<span class=\"kw\">UPDATE<\u002Fspan> prenotazioni\n   <span class=\"kw\">SET<\u002Fspan> stato = <span class=\"str\">'pagata'<\u002Fspan>\n <span class=\"kw\">WHERE<\u002Fspan> id = :id\n   <span class=\"kw\">AND<\u002Fspan> stato = <span class=\"str\">'prenotata'<\u002Fspan>;\n\n<span class=\"cmt\">-- cancellazione speculare<\u002Fspan>\n<span class=\"cmt\">-- :update_pren_cancellata<\u002Fspan>\n<span class=\"kw\">UPDATE<\u002Fspan> prenotazioni\n   <span class=\"kw\">SET<\u002Fspan> stato = <span class=\"str\">'cancellata'<\u002Fspan>\n <span class=\"kw\">WHERE<\u002Fspan> id = :id\n   <span class=\"kw\">AND<\u002Fspan> stato = <span class=\"str\">'prenotata'<\u002Fspan>;<\u002Fpre>\n        <p style=\"font-size: var(--type-small); color: var(--ink-2); margin-top: 18px; line-height: 1.5;\">\n          Endpoint: <span style=\"font-family:'JetBrains Mono',monospace; color: var(--sky);\">POST /api/paga/&lt;id&gt;<\u002Fspan>. Il filtro <em>WHERE stato = 'prenotata'<\u002Fem> rende l'operazione idempotente: una doppia chiamata non altera lo stato.\n        <\u002Fp>\n      <\u002Fdiv>\n\n      <div>\n        <h2 class=\"eyebrow\">Check-in al banco &nbsp;·&nbsp; emissione carta<\u002Fh2>\n        <pre class=\"sql\" style=\"margin-top: 18px;\"><span class=\"cmt\">-- :insert_carta_imbarco_banco<\u002Fspan>\n<span class=\"kw\">INSERT INTO<\u002Fspan> carte_imbarco\n  (prenotazione_id, volo_id,\n   numero_posto, gate_imbarco_id,\n   operatore_id)\n<span class=\"kw\">VALUES<\u002Fspan>\n  (:pren_id, :volo_id,\n   :numero_posto, :gate_id,\n   :operatore_id);\n\n<span class=\"cmt\">-- :update_pren_imbarcato<\u002Fspan>\n<span class=\"kw\">UPDATE<\u002Fspan> prenotazioni\n   <span class=\"kw\">SET<\u002Fspan> stato = <span class=\"str\">'imbarcato'<\u002Fspan>\n <span class=\"kw\">WHERE<\u002Fspan> id = :id;<\u002Fpre>\n        <p style=\"font-size: var(--type-small); color: var(--ink-2); margin-top: 18px; line-height: 1.5;\">\n          Check-in eseguito al banco dall'operatore: <span style=\"font-family:'JetBrains Mono',monospace;\">operatore_id<\u002Fspan> tracciato per audit. Endpoint: <span style=\"font-family:'JetBrains Mono',monospace; color: var(--sky);\">POST /api/operatore/checkin/exec<\u002Fspan>.\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"pagenum\">14 / 23<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- =================== 15 — Modifica/cancellazione voli =================== -->\n  <section class=\"slide\" data-label=\"15 Modifica voli\">\n    <div class=\"chrome\">\n      <div class=\"left\"><span class=\"brand\">SKYPORT<\u002Fspan><span class=\"dot\"><\u002Fspan><span>CRUD<\u002Fspan><\u002Fdiv>\n      <div>02 / Create + Update + Delete · Voli<\u002Fdiv>\n    <\u002Fdiv>\n\n    <h1 class=\"title\">CRUD voli &nbsp;<span style=\"color:var(--ink-3); font-weight:400;\">— create, update, delete<\u002Fspan><\u002Fh1>\n\n    <div style=\"display:grid; grid-template-columns: 1fr 1fr 1fr; gap: 28px; margin-top: 44px; flex: 1;\">\n      <div>\n        <h2 class=\"eyebrow\">INSERT volo<\u002Fh2>\n        <pre class=\"sql\" style=\"margin-top: 14px; font-size: 18px;\"><span class=\"cmt\">-- :insert_volo<\u002Fspan>\n<span class=\"kw\">INSERT INTO<\u002Fspan> voli\n  (codice_volo, compagnia_id, gate_id,\n   origine, destinazione,\n   data_ora_partenza, data_ora_arrivo,\n   posti_totali, stato, prezzo_base)\n<span class=\"kw\">VALUES<\u002Fspan>\n  (:codice_volo, :compagnia_id, :gate_id,\n   :origine, :destinazione,\n   :data_ora_partenza, :data_ora_arrivo,\n   :posti_totali, <span class=\"str\">'programmato'<\u002Fspan>, :prezzo_base);<\u002Fpre>\n        <ul class=\"bullets bullets-sm\" style=\"margin-top: 18px;\">\n          <li>Stato iniziale forzato a <em>programmato<\u002Fem> lato query<\u002Fli>\n          <li><span style=\"font-family:'JetBrains Mono',monospace;\">codice_volo<\u002Fspan> e <span style=\"font-family:'JetBrains Mono',monospace;\">compagnia_id<\u002Fspan> validati lato app<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n\n      <div>\n        <h2 class=\"eyebrow\">UPDATE volo<\u002Fh2>\n        <pre class=\"sql\" style=\"margin-top: 14px; font-size: 18px;\"><span class=\"cmt\">-- :update_volo<\u002Fspan>\n<span class=\"kw\">UPDATE<\u002Fspan> voli\n   <span class=\"kw\">SET<\u002Fspan> gate_id           = :gate_id,\n       data_ora_partenza = :data_ora_partenza,\n       data_ora_arrivo   = :data_ora_arrivo,\n       posti_totali      = :posti_totali,\n       stato             = :stato,\n       prezzo_base       = :prezzo_base,\n       orario_stimato    = :orario_stimato,\n       ritardo_note      = :ritardo_note\n <span class=\"kw\">WHERE<\u002Fspan> id = :id;<\u002Fpre>\n        <ul class=\"bullets bullets-sm\" style=\"margin-top: 18px;\">\n          <li>Riassegna gate, ritocca orari, annota un ritardo<\u002Fli>\n          <li>Le transizioni di stato sono validate lato applicativo<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n\n      <div>\n        <h2 class=\"eyebrow\">DELETE volo &nbsp;·&nbsp; guard<\u002Fh2>\n        <pre class=\"sql\" style=\"margin-top: 14px; font-size: 18px;\"><span class=\"cmt\">-- :pren_attive_volo  (eseguita prima)<\u002Fspan>\n<span class=\"kw\">SELECT<\u002Fspan> <span class=\"fn\">COUNT<\u002Fspan>(*) <span class=\"kw\">AS<\u002Fspan> n\n  <span class=\"kw\">FROM<\u002Fspan> prenotazioni\n <span class=\"kw\">WHERE<\u002Fspan> volo_id = :volo_id\n   <span class=\"kw\">AND<\u002Fspan> stato <span class=\"kw\">IN<\u002Fspan>\n       (<span class=\"str\">'prenotata'<\u002Fspan>,<span class=\"str\">'pagata'<\u002Fspan>,<span class=\"str\">'imbarcato'<\u002Fspan>);\n\n<span class=\"cmt\">-- :delete_volo  (solo se n = 0)<\u002Fspan>\n<span class=\"kw\">DELETE FROM<\u002Fspan> voli\n <span class=\"kw\">WHERE<\u002Fspan> id = :id;<\u002Fpre>\n        <ul class=\"bullets bullets-sm\" style=\"margin-top: 18px;\">\n          <li>Cancellazione bloccata se ci sono prenotazioni attive<\u002Fli>\n          <li>FK <span style=\"font-family:'JetBrains Mono',monospace;\">ON DELETE RESTRICT<\u002Fspan> come difesa finale a livello DB<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"pagenum\">15 / 23<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- =================== 16 — Check-in per nome e cognome =================== -->\n  <section class=\"slide surface\" data-label=\"16 Check-in per nome\">\n    <div class=\"chrome\">\n      <div class=\"left\"><span class=\"brand\">SKYPORT<\u002Fspan><span class=\"dot\"><\u002Fspan><span>CRUD<\u002Fspan><\u002Fdiv>\n      <div>02 / Read · Check-in operatore<\u002Fdiv>\n    <\u002Fdiv>\n\n    <h1 class=\"title\">Check-in al banco &nbsp;<span style=\"color:var(--ink-3); font-weight:400;\">— ricerca per nome e cognome<\u002Fspan><\u002Fh1>\n\n    <div style=\"display:grid; grid-template-columns: 1.5fr 1fr; gap: 56px; margin-top: 48px; flex: 1;\">\n      <div>\n        <h2 class=\"eyebrow\">db/queries.sql · :checkin_by_nome_cognome<\u002Fh2>\n        <pre class=\"sql\" style=\"margin-top: 16px; font-size: 19px;\"><span class=\"kw\">SELECT<\u002Fspan> p.id, p.codice_prenotazione, p.volo_id,\n       v.codice_volo, v.origine, v.destinazione,\n       v.data_ora_partenza,\n       v.posti_totali, v.gate_id,\n       pass.nome    <span class=\"kw\">AS<\u002Fspan> passeggero_nome,\n       pass.cognome <span class=\"kw\">AS<\u002Fspan> passeggero_cognome,\n       pass.documento\n  <span class=\"kw\">FROM<\u002Fspan> prenotazioni p\n  <span class=\"kw\">JOIN<\u002Fspan> voli v          <span class=\"kw\">ON<\u002Fspan> p.volo_id      = v.id\n  <span class=\"kw\">JOIN<\u002Fspan> passeggeri pass <span class=\"kw\">ON<\u002Fspan> p.passeggero_id = pass.id\n  <span class=\"kw\">LEFT JOIN<\u002Fspan> carte_imbarco ci\n         <span class=\"kw\">ON<\u002Fspan> ci.prenotazione_id = p.id\n <span class=\"kw\">WHERE<\u002Fspan> <span class=\"fn\">LOWER<\u002Fspan>(pass.nome)    = <span class=\"fn\">LOWER<\u002Fspan>(:nome)\n   <span class=\"kw\">AND<\u002Fspan> <span class=\"fn\">LOWER<\u002Fspan>(pass.cognome) = <span class=\"fn\">LOWER<\u002Fspan>(:cognome)\n   <span class=\"kw\">AND<\u002Fspan> p.stato = <span class=\"str\">'pagata'<\u002Fspan>\n   <span class=\"kw\">AND<\u002Fspan> ci.id <span class=\"kw\">IS NULL<\u002Fspan>\n <span class=\"kw\">ORDER BY<\u002Fspan> v.data_ora_partenza;<\u002Fpre>\n      <\u002Fdiv>\n\n      <div>\n        <h2 class=\"eyebrow\">Cosa fa<\u002Fh2>\n        <ul class=\"bullets bullets-sm\" style=\"margin-top: 14px;\">\n          <li>L'operatore digita <strong>nome<\u002Fstrong> e <strong>cognome<\u002Fstrong>: la query restituisce tutte le prenotazioni del passeggero <strong>pagate<\u002Fstrong> e <strong>non ancora imbarcate<\u002Fstrong><\u002Fli>\n          <li>Match case-insensitive con <span style=\"font-family:'JetBrains Mono',monospace;\">LOWER()<\u002Fspan> su entrambi i lati<\u002Fli>\n          <li>Il <span style=\"font-family:'JetBrains Mono',monospace;\">LEFT JOIN<\u002Fspan> su <span style=\"font-family:'JetBrains Mono',monospace;\">carte_imbarco<\u002Fspan> con filtro <span style=\"font-family:'JetBrains Mono',monospace;\">ci.id IS NULL<\u002Fspan> esclude chi ha già la carta<\u002Fli>\n        <\u002Ful>\n\n        <h2 class=\"eyebrow\" style=\"margin-top: 32px;\">Tre lookup paralleli<\u002Fh2>\n        <ul class=\"bullets bullets-sm\" style=\"margin-top: 14px;\">\n          <li><span style=\"font-family:'JetBrains Mono',monospace; color: var(--sky);\">:checkin_by_pnr<\u002Fspan> &nbsp;—&nbsp; ricerca per codice prenotazione<\u002Fli>\n          <li><span style=\"font-family:'JetBrains Mono',monospace; color: var(--sky);\">:checkin_by_documento<\u002Fspan> &nbsp;—&nbsp; ricerca per documento<\u002Fli>\n          <li><span style=\"font-family:'JetBrains Mono',monospace; color: var(--sky);\">:checkin_by_nome_cognome<\u002Fspan> &nbsp;—&nbsp; ricerca per anagrafica<\u002Fli>\n        <\u002Ful>\n        <p style=\"font-size: var(--type-small); color: var(--ink-2); margin-top: 18px; line-height: 1.5;\">\n          Tre query con la stessa shape, parametri diversi. Endpoint: <span style=\"font-family:'JetBrains Mono',monospace; color: var(--sky);\">POST /api/operatore/checkin<\u002Fspan>.\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"pagenum\">16 / 23<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- =================== 17 — Sezione 3 cover =================== -->\n  <section class=\"slide dark\" data-label=\"17 Sezione 3\">\n    <div class=\"chrome\">\n      <div class=\"left\"><span class=\"brand\">SKYPORT<\u002Fspan><span class=\"dot\"><\u002Fspan><span>Sezione<\u002Fspan><\u002Fdiv>\n      <div>03 / 04<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"cover\">\n      <div class=\"num\">03<\u002Fdiv>\n      <div class=\"heading\">\n        <h1>Flussi end-to-end<br>per ruolo.<\u002Fh1>\n        <div class=\"sub\">Tre percorsi paralleli: passeggero fino al pagamento, operatore fino al check-in al banco, compagnia sul CRUD voli. Per ogni step: cosa vede l'utente, quale endpoint Flask risponde, come cambia lo stato del database.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"pagenum\">17 / 23<\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- =================== 18 — Flusso passeggero (4 step) =================== -->\n  <section class=\"slide\" data-label=\"18 Flusso passeggero\">\n    <div class=\"chrome\">\n      <div class=\"left\"><span class=\"brand\">SKYPORT<\u002Fspan><span class=\"dot\"><\u002Fspan><span>Flusso passeggero<\u002Fspan><\u002Fdiv>\n      <div>03 / Passeggero · login → pagamento<\u002Fdiv>\n    <\u002Fdiv>\n\n    <h1 class=\"title\">Passeggero &nbsp;<span style=\"color:var(--ink-3); font-weight:400;\">— login → ricerca → prenotazione → pagamento<\u002Fspan><\u002Fh1>\n\n    <div class=\"flow-row\" style=\"margin-top: 64px; grid-template-columns: repeat(4, 1fr); gap: 28px;\">\n      <div class=\"step\">\n        <span class=\"n\">STEP 01<\u
